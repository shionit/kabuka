name: GoReleaser

on:
  push:
    # Trigger only on version tags (v*) to avoid accidental release triggers.
    # Previously matched all tags (*); tightened to reduce attack surface.
    tags:
      - 'v*'

# GoReleaser must create GitHub releases, so contents: write is required here.
# All other workflows use read-only defaults.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # GoReleaser needs full git history to build the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: '.go-version'

      - name: Run GoReleaser
        # Upgraded from v2 → v7.2.1. goreleaser-action v6+ requires the
        # 'distribution' field; 'version: ~> v2' selects the latest GoReleaser
        # v2.x release (backward-compatible with the existing .goreleaser.yml).
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
