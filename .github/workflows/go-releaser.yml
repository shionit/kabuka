name: GoReleaser

on:
  push:
    # Trigger only on version tags (v*) to avoid accidental release triggers.
    # Previously matched all tags (*); tightened to reduce attack surface.
    tags:
      - 'v*'

# GoReleaser must create GitHub releases, so contents: write is required here.
# All other workflows use read-only defaults.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # GoReleaser needs full git history to build the changelog.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: '.go-version'

      - name: Run GoReleaser
        # Upgraded from v2 → v7.2.1. goreleaser-action v6+ requires the
        # 'distribution' field; 'version: ~> v2' selects the latest GoReleaser
        # v2.x release (backward-compatible with the existing .goreleaser.yml).
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
