name: reviewdog
on: [pull_request]

# reviewdog posts review comments on PRs; pull-requests: write is required.
permissions:
  contents: read
  pull-requests: write

jobs:
  reviewdog-check:
    name: reviewdog check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde # v2.9.1
        with:
          egress-policy: audit

      - name: Check out code into the Go module directory
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Install dependencies
        run: go mod download

      - name: staticcheck
        uses: reviewdog/action-staticcheck@644e2b5d4685a886d1bab12f75b04d2410f3db7b # v1.9.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Change reviewdog reporter if you need [github-pr-check,github-check,github-pr-review].
          reporter: github-pr-review
          # Report all results.
          filter_mode: nofilter
          fail_level: warning
          use_go_install: true

      - name: golangci-lint
        uses: reviewdog/action-golangci-lint@4c4340f3ef9498ffe9a0dd3e589bc00e12e2d77c # v2.9.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: nofilter
          fail_level: warning
          workdir: "."
          golangci_lint_flags: "--timeout=5m"
