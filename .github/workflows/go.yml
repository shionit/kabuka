name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Minimal default permissions; jobs declare only what they need.
permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Harden Runner
      # Audit mode: logs all outbound calls so we can tighten egress later
      # without risking false-positive CI failures.
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    # https://github.com/actions/cache/blob/master/examples.md#go---modules
    - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: cache
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download Go Modules
      if: steps.cache.outputs.cache-hit != 'true'
      run: go mod download

    - name: Build
      run: go build -o bin/ -v ./...

    - name: Test
      run: make test-coverage

    - name: Upload Go test coverage
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: Go-test-coverage
        path: coverage.html
